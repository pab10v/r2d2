<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lockGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="150" cy="150" r="140" fill="url(#bgGradient)" />
  
  <!-- Lock icon -->
  <g transform="translate(150, 150)">
    <!-- Lock body -->
    <rect x="-40" y="-20" width="80" height="60" rx="8" fill="url(#lockGradient)" />
    
    <!-- Lock shackle -->
    <path d="M -25 -20 L -25 -35 Q -25 -55, 0 -55 Q 25 -55, 25 -35 L 25 -20" 
          stroke="url(#lockGradient)" stroke-width="8" fill="none" stroke-linecap="round" />
    
    <!-- Key hole -->
    <circle cx="0" cy="5" r="8" fill="#2E7D32" />
    <rect x="-3" y="5" width="6" height="15" fill="#2E7D32" />
  </g>
  
  <!-- Security shield overlay -->
  <g transform="translate(150, 150) scale(0.3)">
    <path d="M 0 -80 L 60 -60 L 60 20 Q 60 60, 0 80 Q -60 60, -60 20 L -60 -60 Z" 
          fill="rgba(255, 255, 255, 0.3)" />
  </g>
</svg>
